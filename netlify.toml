[build]
  command = "cd alpizzificio && npm install && npm run build"
  publish = "alpizzificio/dist/alpizzificio/browser"
  base = "alpizzificio"

[build.environment]
  NODE_VERSION = "24"

[dev]
  publish = "alpizzificio/dist/alpizzificio/browser"


# Redirect SPA (Angular) - tutte le rotte verso index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
